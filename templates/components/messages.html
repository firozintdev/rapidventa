{% if messages %}
<div class="rv-messages-container" aria-live="polite">
  <div class="container">
    {% for message in messages %}
    <div class="alert rv-alert rv-alert--{{ message.tags }} alert-dismissible fade show" role="alert">
      <span class="rv-alert__icon">
        {% if message.tags == 'success' %}<i class="bi bi-check-circle-fill"></i>
        {% elif message.tags == 'error' or message.tags == 'danger' %}<i class="bi bi-x-circle-fill"></i>
        {% elif message.tags == 'warning' %}<i class="bi bi-exclamation-triangle-fill"></i>
        {% else %}<i class="bi bi-info-circle-fill"></i>
        {% endif %}
      </span>
      {{ message }}
      <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
    </div>
    {% endfor %}
  </div>
</div>
{% endif %}
